name: Naukri Auto Update

on:
  schedule:
    - cron: '30 3 * * *'   # Subah 9:00 AM IST (3:30 AM UTC)
    - cron: '30 10 * * *'  # Shaam 4:00 PM IST (10:30 AM UTC)
  workflow_dispatch:      # Isse aap khud bhi 'Run' button daba kar check kar sakte hain

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run script
        env:
          EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
        run: python main.py

